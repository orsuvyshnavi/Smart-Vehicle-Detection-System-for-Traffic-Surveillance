<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Recognition in Traffic - Real-Time Detection System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/3.0.3/plotly.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .video-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .stat-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .weather-btn {
            transition: all 0.3s ease;
        }
        .weather-btn:hover {
            transform: scale(1.05);
        }
        .weather-btn.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <!-- Navigation -->
    <nav class="glass-effect p-4 mb-6">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i class="fas fa-car text-3xl text-white"></i>
                <h1 class="text-2xl font-bold text-white">Vehicle Recognition System</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-white text-sm">Real-Time Traffic Monitoring</span>
                <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Control Panel -->
        <div class="glass-effect rounded-xl p-6 mb-6">
            <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                <i class="fas fa-sliders-h mr-2"></i>Detection Controls
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Source Selection -->
                <div>
                    <label class="block text-sm font-medium text-gray-200 mb-2">Video Source</label>
                    <select id="videoSource" class="w-full p-3 rounded-lg bg-white/20 text-white border border-white/30 focus:ring-2 focus:ring-blue-400">
                        <option value="camera">Live Camera</option>
                        <option value="video">Sample Video</option>
                    </select>
                </div>
                
                <!-- Weather Simulation -->
                <div>
                    <label class="block text-sm font-medium text-gray-200 mb-2">Weather Condition</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="weather-btn p-2 rounded-lg bg-white/20 text-white text-sm active" data-weather="normal">
                            <i class="fas fa-sun mr-1"></i>Normal
                        </button>
                        <button class="weather-btn p-2 rounded-lg bg-white/20 text-white text-sm" data-weather="rain">
                            <i class="fas fa-cloud-rain mr-1"></i>Rain
                        </button>
                        <button class="weather-btn p-2 rounded-lg bg-white/20 text-white text-sm" data-weather="fog">
                            <i class="fas fa-smog mr-1"></i>Fog
                        </button>
                        <button class="weather-btn p-2 rounded-lg bg-white/20 text-white text-sm" data-weather="night">
                            <i class="fas fa-moon mr-1"></i>Night
                        </button>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex items-end">
                    <div class="flex space-x-2">
                        <button id="startBtn" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg transition-colors">
                            <i class="fas fa-play mr-1"></i>Start
                        </button>
                        <button id="stopBtn" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors">
                            <i class="fas fa-stop mr-1"></i>Stop
                        </button>
                        <button id="resetBtn" class="px-4 py-2 bg-yellow-500 hover:bg-yellow-600 text-white rounded-lg transition-colors">
                            <i class="fas fa-refresh mr-1"></i>Reset
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Video Feed -->
            <div class="lg:col-span-2">
                <div class="glass-effect rounded-xl p-6">
                    <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                        <i class="fas fa-video mr-2"></i>Live Detection Feed
                    </h2>
                    <div class="video-container">
                        <img id="videoFeed" src="" alt="Video Feed" class="w-full h-96 object-cover bg-gray-800 rounded-lg">
                    </div>
                    <div class="mt-4 flex items-center justify-between text-sm text-gray-200">
                        <span>Status: <span id="status" class="text-green-400">Ready</span></span>
                        <span>Weather: <span id="currentWeather" class="text-blue-400">Normal</span></span>
                    </div>
                </div>
            </div>

            <!-- Statistics Panel -->
            <div class="space-y-6">
                <!-- Real-time Stats -->
                <div class="glass-effect rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-4 flex items-center">
                        <i class="fas fa-chart-bar mr-2"></i>Real-time Statistics
                    </h3>
                    
                    <div class="space-y-4">
                        <div class="stat-card bg-white/10 rounded-lg p-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-200">Total Vehicles</p>
                                    <p id="totalVehicles" class="text-2xl font-bold text-white">0</p>
                                </div>
                                <i class="fas fa-car text-3xl text-blue-400"></i>
                            </div>
                        </div>
                        
                        <div class="stat-card bg-white/10 rounded-lg p-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-200">Processing FPS</p>
                                    <p id="currentFPS" class="text-2xl font-bold text-white">0</p>
                                </div>
                                <i class="fas fa-tachometer-alt text-3xl text-green-400"></i>
                            </div>
                        </div>
                        
                        <div class="stat-card bg-white/10 rounded-lg p-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-200">Avg Confidence</p>
                                    <p id="avgConfidence" class="text-2xl font-bold text-white">0%</p>
                                </div>
                                <i class="fas fa-bullseye text-3xl text-yellow-400"></i>
                            </div>
                        </div>
                        
                        <div class="stat-card bg-white/10 rounded-lg p-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-200">Processing Time</p>
                                    <p id="processingTime" class="text-2xl font-bold text-white">0ms</p>
                                </div>
                                <i class="fas fa-clock text-3xl text-purple-400"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Vehicle Type Distribution -->
                <div class="glass-effect rounded-xl p-6">
                    <h3 class="text-lg font-semibold text-white mb-4 flex items-center">
                        <i class="fas fa-pie-chart mr-2"></i>Vehicle Types
                    </h3>
                    <div id="vehicleChart" class="h-64"></div>
                </div>
            </div>
        </div>

        <!-- Performance Analysis -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
            <!-- Performance Metrics -->
            <div class="glass-effect rounded-xl p-6">
                <h3 class="text-lg font-semibold text-white mb-4 flex items-center">
                    <i class="fas fa-chart-line mr-2"></i>Performance Metrics
                </h3>
                <div id="performanceChart" class="h-64"></div>
            </div>

            <!-- Weather Impact Analysis -->
            <div class="glass-effect rounded-xl p-6">
                <h3 class="text-lg font-semibold text-white mb-4 flex items-center">
                    <i class="fas fa-cloud-sun mr-2"></i>Weather Impact
                </h3>
                <div id="weatherChart" class="h-64"></div>
            </div>
        </div>

        <!-- Export Controls -->
        <div class="glass-effect rounded-xl p-6 mt-6">
            <h3 class="text-lg font-semibold text-white mb-4 flex items-center">
                <i class="fas fa-download mr-2"></i>Data Export
            </h3>
            <div class="flex flex-wrap gap-4">
                <button id="exportJSON" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors">
                    <i class="fas fa-file-code mr-1"></i>Export JSON
                </button>
                <button id="exportCSV" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg transition-colors">
                    <i class="fas fa-file-csv mr-1"></i>Export CSV
                </button>
                <button id="generateReport" class="px-4 py-2 bg-purple-500 hover:bg-purple-600 text-white rounded-lg transition-colors">
                    <i class="fas fa-file-pdf mr-1"></i>Generate Report
                </button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
